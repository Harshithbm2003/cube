<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 340" fill="none">
  <!-- Background / giftbox -->
  <rect x="30" y="120" width="160" height="160" rx="4" fill="#F8F3EC"/>
  <rect x="30" y="120" width="160" height="160" rx="4" fill="none" stroke="#C9A84C" stroke-width="1"/>
  <!-- Box ribbon vertical -->
  <rect x="104" y="120" width="12" height="160" fill="#C9A84C" opacity="0.35"/>
  <!-- Box ribbon horizontal -->
  <rect x="30" y="194" width="160" height="12" fill="#C9A84C" opacity="0.35"/>
  <!-- Bow -->
  <path d="M110 195 Q95 175 80 180 Q90 195 110 195 Z" fill="#C9A84C" opacity="0.6"/>
  <path d="M110 195 Q125 175 140 180 Q130 195 110 195 Z" fill="#C9A84C" opacity="0.6"/>
  <circle cx="110" cy="195" r="8" fill="#C9A84C"/>
  
  <!-- Small bottle 1 -->
  <rect x="50" y="60" width="28" height="72" rx="3" fill="#D4B483"/>
  <rect x="60" y="54" width="8" height="10" rx="2" fill="#C9A84C"/>
  <rect x="48" y="74" width="32" height="2" fill="#C9A84C" opacity="0.6"/>
  <text x="64" y="102" font-family="Georgia,serif" font-size="5" fill="#1C1C1E" text-anchor="middle">OUD</text>
  
  <!-- Small bottle 2 -->
  <rect x="96" y="50" width="28" height="82" rx="14" fill="#D4996A"/>
  <rect x="106" y="44" width="8" height="10" rx="2" fill="#C9A84C"/>
  <rect x="96" y="68" width="28" height="2" fill="#C9A84C" opacity="0.5"/>
  <text x="110" y="98" font-family="Georgia,serif" font-size="5" fill="#1C1C1E" text-anchor="middle">AMBER</text>
  
  <!-- Small bottle 3 -->
  <rect x="142" y="58" width="28" height="74" rx="3" fill="#4A1840"/>
  <rect x="152" y="52" width="8" height="10" rx="2" fill="#C9A84C"/>
  <rect x="140" y="72" width="32" height="2" fill="#C9A84C" opacity="0.6"/>
  <text x="156" y="100" font-family="Georgia,serif" font-size="5" fill="#F8F3EC" text-anchor="middle">ROSE</text>
  
  <!-- "GTG Collection" text on box front -->
  <text x="110" y="165" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#1C1C1E" text-anchor="middle" letter-spacing="2">GTG</text>
  <text x="110" y="180" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#C9A84C" text-anchor="middle" letter-spacing="1">Signature Collection</text>

  <text x="110" y="230" font-family="Arial" font-size="7" fill="#888" text-anchor="middle" letter-spacing="1.5">3 × 30 ML</text>
  <text x="110" y="244" font-family="Arial" font-size="6" fill="#AAA" text-anchor="middle">DISCOVERY SET</text>
  
  <!-- Stars -->
  <text x="110" y="262" font-family="Arial" font-size="14" fill="#C9A84C" text-anchor="middle">★ ★ ★</text>
</svg>
