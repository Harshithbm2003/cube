<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 340" fill="none">
  <!-- Cap - tall rectangular luxury style -->
  <rect x="85" y="0" width="50" height="38" rx="2" fill="#1C1C1E"/>
  <rect x="89" y="4" width="42" height="30" rx="1" fill="#2A2A2A"/>
  <!-- Gold band on cap -->
  <rect x="85" y="34" width="50" height="4" fill="#C9A84C"/>
  <rect x="89" y="6" width="34" height="2" fill="#C9A84C" opacity="0.4"/>
  
  <!-- Neck -->
  <rect x="97" y="38" width="26" height="22" fill="#3D1A2E"/>
  
  <!-- Shoulder -->
  <path d="M72 56 L97 60 L123 60 L148 56 L148 72 L72 72 Z" fill="#5C1F45"/>
  
  <!-- Body - tall rectangular -->
  <rect x="64" y="68" width="92" height="210" rx="4" fill="#4A1840"/>
  
  <!-- Glass depth / sides -->
  <rect x="64" y="68" width="92" height="210" rx="4" fill="url(#roseGrad)"/>
  
  <!-- Gold trim lines -->
  <rect x="64" y="82" width="92" height="2" fill="#C9A84C" opacity="0.6"/>
  <rect x="64" y="270" width="92" height="2" fill="#C9A84C" opacity="0.6"/>
  <rect x="64" y="68" width="2" height="212" fill="#C9A84C" opacity="0.4"/>
  <rect x="154" y="68" width="2" height="212" fill="#C9A84C" opacity="0.4"/>

  <!-- Label - dark elegant -->
  <rect x="72" y="94" width="76" height="130" rx="2" fill="#2A0E22" opacity="0.8"/>
  <rect x="74" y="96" width="72" height="126" rx="1" fill="#1C1C1E" opacity="0.5"/>
  
  <!-- Rose illustration on label -->
  <circle cx="110" cy="122" r="16" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
  <!-- Stylized rose petals -->
  <ellipse cx="110" cy="112" rx="6" ry="9" fill="#8B0045" opacity="0.7"/>
  <ellipse cx="118" cy="118" rx="6" ry="8" fill="#A00050" opacity="0.7"/>
  <ellipse cx="115" cy="127" rx="7" ry="7" fill="#8B0045" opacity="0.7"/>
  <ellipse cx="105" cy="128" rx="7" ry="6" fill="#A00050" opacity="0.7"/>
  <ellipse cx="102" cy="118" rx="6" ry="8" fill="#8B0045" opacity="0.7"/>
  <circle cx="110" cy="120" r="5" fill="#C9A84C" opacity="0.3"/>

  <!-- Label text -->
  <line x1="78" y1="143" x2="142" y2="143" stroke="#C9A84C" stroke-width="0.6"/>
  <text x="110" y="157" font-family="Georgia,serif" font-size="14" font-weight="700" fill="#F8F3EC" text-anchor="middle" letter-spacing="1">Rose</text>
  <text x="110" y="172" font-family="Georgia,serif" font-size="13" font-style="italic" fill="#C9A84C" text-anchor="middle">Noir</text>
  <line x1="78" y1="180" x2="142" y2="180" stroke="#C9A84C" stroke-width="0.6"/>
  <text x="110" y="193" font-family="Arial" font-size="6.5" fill="#888" text-anchor="middle" letter-spacing="2">GTG PERFUMES</text>
  <text x="110" y="208" font-family="Arial" font-size="6.5" fill="#666" text-anchor="middle" letter-spacing="1">EDP · 50 ml</text>
  
  <!-- Glass shine -->
  <rect x="70" y="74" width="5" height="200" rx="2.5" fill="white" opacity="0.06"/>

  <defs>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A0014" stop-opacity="0.6"/>
      <stop offset="25%" stop-color="#8B0045" stop-opacity="0.08"/>
      <stop offset="75%" stop-color="#8B0045" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#1A0014" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
</svg>
