<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 340" fill="none">
  <!-- Bottle neck -->
  <rect x="88" y="20" width="44" height="12" rx="4" fill="#C9A84C"/>
  <rect x="92" y="8" width="36" height="16" rx="3" fill="#E8C96A"/>
  <rect x="98" y="2" width="24" height="10" rx="3" fill="#C9A84C"/>
  
  <!-- Cap -->
  <rect x="84" y="0" width="52" height="24" rx="6" fill="#1C1C1E"/>
  <rect x="88" y="4" width="44" height="16" rx="4" fill="#2A2A2A"/>
  <rect x="94" y="8" width="32" height="8" rx="2" fill="#C9A84C" opacity="0.6"/>

  <!-- Neck -->
  <path d="M92 24 L88 52 L132 52 L128 24 Z" fill="#D4B483"/>
  <path d="M94 24 L90 52 L130 52 L126 24 Z" fill="#E8D4A8"/>

  <!-- Shoulder -->
  <path d="M70 52 Q88 44 110 44 Q132 44 150 52 L156 72 L64 72 Z" fill="#C9A84C"/>
  
  <!-- Body -->
  <rect x="60" y="68" width="100" height="210" rx="8" fill="#D4B483"/>
  
  <!-- Glass effect / body gradient -->
  <rect x="60" y="68" width="100" height="210" rx="8" fill="url(#bodyGrad)"/>
  
  <!-- Label background -->
  <rect x="68" y="110" width="84" height="120" rx="4" fill="#FAF6F0"/>
  <rect x="70" y="112" width="80" height="116" rx="3" fill="white" opacity="0.9"/>
  
  <!-- Label content -->
  <rect x="74" y="118" width="72" height="1" fill="#C9A84C"/>
  <text x="110" y="138" font-family="Georgia,serif" font-size="9" font-weight="700" fill="#1C1C1E" text-anchor="middle" letter-spacing="3">GTG</text>
  <text x="110" y="152" font-family="Georgia,serif" font-size="14" font-weight="700" fill="#1C1C1E" text-anchor="middle" letter-spacing="1">Oud</text>
  <text x="110" y="165" font-family="Georgia,serif" font-size="14" font-style="italic" fill="#C9A84C" text-anchor="middle">Royale</text>
  <rect x="74" y="174" width="72" height="1" fill="#C9A84C"/>
  <text x="110" y="188" font-family="Arial" font-size="7.5" fill="#888" text-anchor="middle" letter-spacing="2">EAU DE PARFUM</text>
  <text x="110" y="200" font-family="Arial" font-size="7" fill="#888" text-anchor="middle">100 ml · 3.4 fl oz</text>
  <rect x="74" y="208" width="72" height="1" fill="#C9A84C" opacity="0.4"/>
  <text x="110" y="222" font-family="Arial" font-size="6.5" fill="#AAA" text-anchor="middle" letter-spacing="1.5">HANDCRAFTED</text>
  
  <!-- Bottom of bottle -->
  <path d="M60 268 Q60 278 68 278 L152 278 Q160 278 160 268 L160 265 L60 265 Z" fill="#C0963C"/>
  
  <!-- Highlight / glass shine -->
  <rect x="66" y="80" width="6" height="180" rx="3" fill="white" opacity="0.2"/>
  <rect x="76" y="76" width="3" height="188" rx="1.5" fill="white" opacity="0.12"/>

  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B7A2F" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#E8C96A" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#E8C96A" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#9B7A2F" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
</svg>
